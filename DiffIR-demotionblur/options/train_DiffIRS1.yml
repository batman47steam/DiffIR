# general settings
name: train_DiffIRS1
model_type: DiffIRS1Model
scale: 1
num_gpu: auto  # auto: can infer from your visible devices automatically. official: 8 GPUs
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: TrainSet
    type: DeblurPairedDataset
    #dataroot_gt: Datasets/train/GoPro/target_crops
    #dataroot_lq: Datasets/train/GoPro/input_crops
    dataroot_gt: nlos-datasets/STL-10/B/train
    dataroot_lq: nlos-datasets/STL-10/C_dark_1_d100_occluder/train
    #dataroot_gt: /root/motion_deblur/train_crops/target_crops # /home/ps/ComradeBionic/DiffIR/DiffIR-demotionblur/Datasets/train/GoPro/target_crops
    #dataroot_lq: /root/motion_deblur/train_crops/input_crops  # /home/ps/ComradeBionic/DiffIR/DiffIR-demotionblur/Datasets/train/GoPro/input_crops
    geometric_augs: false

    # mean: [0.5, 0.5, 0.5]
    # std: [0.5, 0.5, 0.5]

    filename_tmpl: '{}'
    io_backend:
      type: disk


    num_worker_per_gpu: 12
    batch_size_per_gpu: 32
    #mini_batch_sizes: [8,4,2,2,1,1]             # Batch size per gpu
    #iters: [92000,80000,38000,33000,33000,24000]
    #iters: 240000
    gt_size: 256   # Max patch size for progressive training
    #gt_sizes: [192, 256,320,384,464,512]  # Patch sizes for progressive training.

    # data loader
    use_shuffle: true
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  # Uncomment these for validation
  val:
    name: Real
    type: DeblurPairedDataset
    gt_size: 256
    dataroot_gt: nlos-datasets/STL-10/stl10_genera/real_withstl10
    dataroot_lq: nlos-datasets/STL-10/stl10_genera/C_dark_1_d100_occluder_test/real
    io_backend:
      type: disk
  
  # val_2:
  #   name: STL
  #   type: DeblurPairedDataset
  #   gt_size: 256
  #   dataroot_gt: nlos-datasets/STL-10/test/gt_test/
  #   dataroot_lq: nlos-datasets/STL-10/test/C_dark_1_d100_occluder_test/
  #   io_backend:
  #     type: disk

# network structures
network_g:
  type: DiffIRS1
  n_encoder_res: 5 # 控制cpen里面堆叠的残差块的数量
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [2,2,2,2]
  num_refinement_blocks: 4 # 最后的输出那里transformer block的数目
  heads: [1,2,4,8]
  ffn_expansion_factor: 2
  bias: False
  LayerNorm_type: WithBias
  drop_out_rate: 0.2

# path
path:
  pretrain_network_g: ~
  param_key_g: params_ema
  strict_load_g: true
  resume_state: ~ 

# training settings
train:
  ema_decay: 0

  optim_g:
    type: Adam
    lr: !!float 2e-4 # YAML语法，以float解释后面的数字
    weight_decay: 0
    betas: [0.9, 0.999]

#  scheduler:
#    type: CosineAnnealingRestartCyclicLR # 这里需要
#    periods: [92000, 208000]
#    restart_weights: [1,1]
#    eta_mins: [0.000285,0.000001]
  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 300000
    eta_min: !!float 1e-7

  pixel_iter: 30000 # 相当于先利用pixel loss进行预热
  total_iter: 300000
  warmup_iter: -1  # no warm up

  mixing_augs:
    mixup: false
    mixup_beta: 1.2
    use_identity: true

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

#  perceptual_opt:
#    type: PerceptualLoss
#    layer_weights:
#      'conv1_2': 0.1
#      'conv2_2': 0.1
#      'conv3_4': 1
#      'conv4_4': 1
#      'conv5_4': 1
#    vgg_type: vgg19
#    use_input_norm: true # 是他自己用一套mean和std归一化gt
#    perceptual_weight: !!float 1
#    style_weight: 0
#    range_norm: false
#    criterion: l1

# Uncomment these for validation
# validation settings
val:
  val_freq: !!float 2e3 # 每5000下再val一下
  save_img: True # 保持比较好

  metrics:
    psnr: # metric name
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim: # 另外一个指标
      type: calculate_ssim
      crop_border: 0
      test_y_channel:
      false better: higher

# logging settings
logger:
  print_freq: 500
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500